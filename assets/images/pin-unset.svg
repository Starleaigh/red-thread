<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Soft shadow cast on board surface below, selling the floating height -->
  <ellipse cx="17" cy="30.5" rx="4.5" ry="1.2" fill="rgba(0,0,0,0.22)"/>

  <filter id="float-shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.45"/>
  </filter>

  <g filter="url(#float-shadow)">
    <!-- Pin head -->
    <ellipse cx="16" cy="10" rx="7" ry="7" fill="#cc2200"/>
    <!-- Shine highlight -->
    <ellipse cx="13.5" cy="7.5" rx="2.5" ry="2" fill="rgba(255,255,255,0.35)"/>
    <!-- Collar -->
    <rect x="13.5" y="15" width="5" height="3" rx="1" fill="#991a00"/>
    <!-- Full length shaft — not yet pushed in -->
    <line x1="16" y1="18" x2="16" y2="28" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <!-- Point -->
    <circle cx="16" cy="28" r="1.2" fill="#555555"/>
  </g>
</svg>
